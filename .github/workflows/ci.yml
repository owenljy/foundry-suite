name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/now-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: plugins/now-mcp/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: plugins/now-mcp/.nvmrc
          cache: pnpm
          cache-dependency-path: plugins/now-mcp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm exec biome ci src

      - name: Test
        run: pnpm test
